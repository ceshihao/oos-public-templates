FormatVersion: OOS-2019-06-01
Description:
  name-en: ACS-ACK-DeployRevisionOnApplicationGroup
  name-zh-cn: 在单个ACK应用分组上部署部署物
  en: Deploy deployments on single ACK application group
  zh-cn: 在单个ACK应用分组上部署部署物
Parameters:
  applicationName:
    Label:
      en: ApplicationName
      zh-cn: 应用名称
    Type: String
    AssociationProperty: ALIYUN::OOS::Application::ApplicationName
  applicationGroupName:
    Label:
      en: ApplicationGroupName
      zh-cn: 应用分组名称
    Type: String
    AssociationProperty: ALIYUN::OOS::ApplicationGroup::ApplicationGroupName
    AssociationPropertyMetadata:
      ApplicationName: ${applicationName}
  deployRevisionId:
    Label:
      en: DeployRevisionId
      zh-cn: 部署物ID
    Type: String
    AssociationProperty: ALIYUN::OOS::Application::DeployRevisionId
    AssociationPropertyMetadata:
      ApplicationName: ${applicationName}
  clusterId:
    Label:
      en: ClusterId
      zh-cn: ACK集群ID
    Description:
      en: If specified, the deployment will be performed on this cluster directly without fetching the cluster list from the application group.
      zh-cn: 如果指定了该参数，将直接在该集群上执行部署，不再从应用分组获取集群列表。
    Type: String
    Default: ''
  nameSpace:
    Label:
      en: NameSpace
      zh-cn: 命名空间
    Description:
      en: If specified, this namespace will be used instead of the one from the deploy revision detail.
      zh-cn: 如果指定了该参数，将使用该命名空间替代部署物版本详情中的命名空间。
    Type: String
    Default: ''
Tasks:
  - Name: getApplicationGroupDetail
    Action: ACS::ExecuteApi
    Description:
      en: GetApplicationGroupDetail
      zh-cn: 获取应用分组详情
    Properties:
      Service: oos
      API: GetApplicationGroup
      Parameters:
        RegionId: cn-hangzhou
        ApplicationName: '{{ applicationName }}'
        Name: '{{ applicationGroupName }}'
    Outputs:
      tagKey:
        Type: String
        ValueSelector: .ApplicationGroup.ImportTagKey
      tagValue:
        Type: String
        ValueSelector: .ApplicationGroup.ImportTagValue
      deployRegionId:
        Type: String
        ValueSelector: .ApplicationGroup.DeployRegionId
  - Name: getApplicationParameters
    Action: ACS::CICD::ListApplicationParameters
    Description:
      en: GetApplicationParameters
      zh-cn: 获取应用参数
    Properties:
      applicationName: '{{ applicationName }}'
      applicationGroupName: '{{ applicationGroupName }}'
      deployRegionId: '{{ getApplicationGroupDetail.deployRegionId }}'
    Outputs:
      applicationParameters:
        Type: List
        ValueSelector: .applicationParameters
  - Name: getClusterList
    Action: 'ACS::SelectTargets'
    Description:
      en: GetClusterList
      zh-cn: 获取集群列表
    When:
      Fn::Equals:
        - '{{ clusterId }}'
        - ''
    Properties:
      ResourceType: 'ALIYUN::CS::Cluster'
      RegionId: '{{ getApplicationGroupDetail.deployRegionId }}'
      Filters:
        - Type: ApplicationGroup
          ApplicationName: '{{ applicationName }}'
          ApplicationGroupName: '{{ applicationGroupName }}'
    Outputs:
      clusterList:
        Type: List
        ValueSelector: 'Instances.Instance[].InstanceId'
  - Name: DeployRevision
    Action: 'ACS::CICD::DeployRevisionOnAck'
    Description:
      en: DeployRevision
      zh-cn: 发布部署物
    Properties:
      regionId: '{{ getApplicationGroupDetail.deployRegionId }}'
      clusterId: '{{ ACS::TaskLoopItem }}'
      applicationParameters: '{{ getApplicationParameters.applicationParameters }}'
      deployRevisionId: '{{ deployRevisionId }}'
      importApplicationParameters: true
      configMapName: app-config
      secretName: app-secret
      nameSpace: '{{ nameSpace }}'
    Loop:
      Items:
        Fn::If:
          - Fn::Equals:
              - '{{ clusterId }}'
              - ''
          - '{{ getClusterList.clusterList }}'
          - - '{{ clusterId }}'
      RateControl:
        Mode: Concurrency
        MaxErrors: 0
        Concurrency: 5
      Outputs:
        stackOutputsList:
          AggregateType: 'Fn::ListJoin'
          AggregateField: stackOutputs
        stackStatusList:
          AggregateType: 'Fn::ListJoin'
          AggregateField: stackStatus
    Outputs:
      stackOutputs:
        Type: String
        ValueSelector: stackOutputs
      stackStatus:
        Type: String
        ValueSelector: stackStatus
  - Name: updateDeployedRevision
    Action: ACS::ExecuteAPI
    Description:
      en: Update the deployed revision
      zh-cn: 更新部署的版本
    Properties:
      Service: OOS
      API: UpdateApplicationGroup
      Parameters:
        RegionId: cn-hangzhou
        ApplicationName: '{{ applicationName }}'
        Name: '{{ applicationGroupName }}'
        DeployedRevisionId: '{{ deployRevisionId }}'
Outputs:
  stackOutputs:
    Type: String
    Value: '{{DeployRevision.stackOutputsList}}'
  stackStatus:
    Type: String
    Value: '{{DeployRevision.stackStatusList}}'
